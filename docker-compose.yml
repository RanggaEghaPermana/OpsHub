services:
  mysql:
    image: mysql:8.4
    container_name: umkm-opshub-mysql
    environment:
      MYSQL_DATABASE: umkm_opshub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
